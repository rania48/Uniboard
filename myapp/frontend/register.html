<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | UniBoard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="grid-bg"></div>

    <main class="page-container">
        <!-- Branding Side -->
        <div class="branding-side">
            <div class="branding-content">
                <div class="brand-logo-large">
                    <i class="fas fa-university" style="color: white;"></i>
                </div>
                <h1><span style="color: white;">Uni</span>Board</h1>
                <p>Portail Académique Universitaire</p>

                <div class="auth-stats">
                    <div class="stat-box">
                        <h3>500</h3>
                        <p>Étudiants</p>
                    </div>
                    <div class="stat-box">
                        <h3>60</h3>
                        <p>Enseignants</p>
                    </div>
                    <div class="stat-box">
                        <h3>3</h3>
                        <p>Rapports</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Register Side -->
        <div class="register-side">
            <div class="auth-card" style="max-width: 520px;">
                <div class="card-header">
                    <a href="login.html"
                        style="color: var(--text-muted); font-size: 12px; text-decoration: none; margin-bottom: 20px; display: inline-block;">
                        <i class="fas fa-arrow-left"></i> Retour à la connexion
                    </a>
                    <h2>Créer un compte</h2>
                    <p>Remplissez le formulaire — un admin validera votre compte</p>
                </div>

                <form id="registerForm">
                    <div class="form-item">
                        <label>Nom complet</label>
                        <input type="text" id="regFullName" class="form-input" placeholder="ex: Ahmed Benali" required>
                    </div>

                    <div class="form-item">
                        <label>Adresse Email</label>
                        <input type="email" id="regEmail" class="form-input" placeholder="ahmed@universite.ma" required>
                    </div>

                    <div class="form-item">
                        <label>Mot de passe</label>
                        <input type="password" id="regPassword" class="form-input" placeholder="••••••••" required>
                    </div>

                    <div class="form-item">
                        <label>Confirmer le mot de passe</label>
                        <input type="password" id="regConfirmPassword" class="form-input" placeholder="••••••••"
                            required>
                    </div>

                    <div class="form-item">
                        <label>Rôle</label>
                        <select id="regRole" class="form-select">
                            <option value="student">Étudiant</option>
                            <option value="teacher">Enseignant</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">
                        S'inscrire <i class="fas fa-user-plus"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
