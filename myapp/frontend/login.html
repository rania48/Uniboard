<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | UniBoard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="grid-bg"></div>

    <main class="page-container">
        <!-- Branding Side -->
        <div class="branding-side">
            <div class="branding-content">
                <div class="brand-logo-large">
                    <i class="fas fa-university" style="color: white;"></i>
                </div>
                <h1>UniBoard</h1>
                <p>Portail Académique Universitaire</p>

                <div class="auth-stats">
                    <div class="stat-box">
                        <h3>500</h3>
                        <p>Étudiants</p>
                    </div>
                    <div class="stat-box">
                        <h3>60</h3>
                        <p>Enseignants</p>
                    </div>
                    <div class="stat-box">
                        <h3>3</h3>
                        <p>Rapports</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Login Side -->
        <div class="login-side">
            <div class="auth-card">
                <div class="card-header">
                    <h2>Connexion</h2>
                    <p>Accédez à votre espace académique</p>
                </div>

                <form id="loginForm">
                    <div class="form-item">
                        <label>Adresse Email</label>
                        <input type="text" id="username" class="form-input" placeholder="admin@universite.ma" required>
                    </div>

                    <div class="form-item">
                        <label>Mot de passe</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-primary">
                        Se connecter <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="card-footer">
                    Pas encore de compte ? <a href="register.html">Créer un compte</a>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
